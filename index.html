<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한강 가즈아 - 가상 트레이딩 게임</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="topbar" aria-label="게임 상태">
        <div>
          <p class="label">총 자산</p>
          <strong id="netWorth">1,000,000원</strong>
        </div>
        <div>
          <p class="label">현금</p>
          <strong id="cash">1,000,000원</strong>
        </div>
        <div>
          <p class="label">수익률</p>
          <strong id="returnRate" class="flat">0.00%</strong>
        </div>
        <div>
          <p class="label">남은 시간</p>
          <strong id="timer">03:00</strong>
        </div>
      </section>

      <section class="market-layout">
        <aside class="panel asset-panel" aria-label="종목 목록">
          <div class="panel-title">
            <h1>한강 가즈아</h1>
            <span>가제</span>
          </div>
          <div id="assetList" class="asset-list"></div>
        </aside>

        <section class="chart-section" aria-label="실시간 차트">
          <div class="chart-header">
            <div>
              <p class="label">선택 종목</p>
              <h2 id="selectedName">개미전자</h2>
            </div>
            <div class="price-box">
              <p id="selectedPrice">10,000원</p>
              <span id="selectedMove" class="flat">0.00%</span>
            </div>
          </div>
          <canvas id="chartCanvas" width="900" height="420" aria-label="가격 차트"></canvas>
          <div class="ticker" id="tickerText">시장 개장 준비 중...</div>
        </section>

        <aside class="panel trade-panel" aria-label="거래 패널">
          <div class="tabs" role="tablist" aria-label="거래 방식">
            <button id="spotTab" class="active" type="button">현물</button>
            <button id="leverageTab" type="button">레버리지</button>
          </div>

          <div class="trade-card">
            <p class="label">주문 금액</p>
            <div class="quick-row">
              <button data-percent="0.25" type="button">25%</button>
              <button data-percent="0.5" type="button">50%</button>
              <button data-percent="1" type="button">풀매수</button>
            </div>
            <input id="orderAmount" type="number" min="1000" step="1000" value="100000" />
          </div>

          <div id="leverageControls" class="trade-card hidden">
            <p class="label">배율</p>
            <div class="quick-row">
              <button data-lev="10" class="active" type="button">10x</button>
              <button data-lev="50" type="button">50x</button>
              <button data-lev="100" type="button">100x</button>
            </div>
            <p class="hint">불리하게 움직이면 즉시 강제 청산됩니다.</p>
          </div>

          <div class="action-grid">
            <button id="buyButton" class="buy" type="button">매수</button>
            <button id="sellButton" class="sell" type="button">매도</button>
          </div>

          <div class="holdings">
            <h3>보유 현황</h3>
            <div id="holdingsList"></div>
          </div>
        </aside>
      </section>

      <section class="bottom-grid">
        <article class="panel log-panel">
          <div class="mini-title">
            <h3>뉴스 속보</h3>
            <span id="panicMeter">탐욕 50</span>
          </div>
          <div id="newsFeed" class="feed"></div>
        </article>

        <article class="panel log-panel">
          <div class="mini-title">
            <h3>매매 로그</h3>
            <span id="tradeCount">0회</span>
          </div>
          <div id="tradeLog" class="feed"></div>
        </article>
      </section>
    </main>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <div id="startModal" class="modal">
      <div class="modal-box">
        <p class="eyebrow">가상 시장 시뮬레이션</p>
        <h2>한강 가즈아</h2>
        <p>3분 동안 요동치는 가상 차트를 타고 최대 자산을 노려보세요. 뉴스는 친절하지 않고, 레버리지는 더더욱 친절하지 않습니다.</p>
        <div class="mode-row">
          <button data-mode="60" type="button">60초</button>
          <button data-mode="180" class="active" type="button">3분</button>
          <button data-mode="300" type="button">5분</button>
        </div>
        <button id="startButton" class="primary" type="button">시장 입장</button>
      </div>
    </div>

    <div id="endModal" class="modal hidden">
      <div class="modal-box">
        <p class="eyebrow">장 마감</p>
        <h2 id="resultTitle">결과</h2>
        <div id="resultStats" class="result-stats"></div>
        <button id="restartButton" class="primary" type="button">다시 매매</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
